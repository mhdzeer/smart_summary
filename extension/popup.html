<!DOCTYPE html>
<html dir="rtl">

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 320px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f8faff;
            color: #1a73e8;
        }

        h2 {
            margin: 0 0 15px;
            font-size: 18px;
            text-align: center;
            color: #0d47a1;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            transition: 0.2s;
        }

        .btn:hover {
            background: #1557b0;
            transform: translateY(-1px);
        }

        .status {
            margin-top: 15px;
            font-size: 13px;
            color: #555;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            padding-top: 12px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <h2>⚡ Smart YT Summarizer</h2>
    <button id="start" class="btn">🚀 ابدأ التلخيص التلقائي</button>
    <div id="msg" class="status">جاهز للعمل...</div>
    <script src="popup.js"></script>
</body>

</html>
